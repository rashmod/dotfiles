##### ──────────────────────────────────────────────
#####  Reload & Base Configuration
##### ──────────────────────────────────────────────

# Unbind 'r' to remove any existing keybinding
unbind r

# Bind 'r' to reload the Tmux configuration file
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded! ✅"

# Advertise a modern terminal type to applications inside tmux
set -g default-terminal "tmux-256color"

# Pass through truecolor (24-bit RGB) support
set -as terminal-overrides ",*:Tc"
# Allow tmux ≥3.2 to detect RGB support automatically
set -as terminal-features ",xterm-256color:RGB,tmux-256color:RGB"

# Increase scrollback so long-running logs are retained
set -g history-limit 100000


##### ──────────────────────────────────────────────
#####  Prefix Key & Controls
##### ──────────────────────────────────────────────

# Change prefix key to Ctrl + A (more natural, avoids Ctrl + S flow issues on macOS)
unbind C-b
set -g prefix C-s
bind a send-prefix        # In nested tmux, Ctrl + A then 'a' sends prefix to inner session
set -g escape-time 0      # Reduces key chord delay


##### ──────────────────────────────────────────────
#####  Mouse, Windows & Panes
##### ──────────────────────────────────────────────

# Enable mouse support (resizing panes, switching windows, etc.)
set -g mouse on

# Ensure window index numbers are renumbered when a window is deleted
set-option -g renumber-windows on

# Start window/pane numbering from 1
set -g base-index 1
setw -g pane-base-index 1


##### ──────────────────────────────────────────────
#####  Keybindings & Navigation
##### ──────────────────────────────────────────────

# Enable vi-style keybindings in copy mode
set-window-option -g mode-keys vi

# Start selection in copy mode when 'v' is pressed (like Vim)
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection

# Pane navigation using Vim-style keys (h, j, k, l)
bind-key h select-pane -L  # Move left
bind-key l select-pane -R  # Move right
bind-key j select-pane -D  # Move down
bind-key k select-pane -U  # Move up

# Open tmux-sessionizer popup scoped to ~/personal by default
bind-key -n C-f display-popup -E "tmux-sessionizer"

# Keep the original full filesystem scan on a separate binding
bind-key -n M-f display-popup -E "tmux-sessionizer all"


##### ──────────────────────────────────────────────
#####  Cross-Platform Clipboard Integration
##### ──────────────────────────────────────────────
# This section auto-detects which clipboard utility is available
# and uses the right one for macOS, Wayland, or X11.

# macOS (pbcopy/pbpaste)
if-shell 'command -v pbcopy >/dev/null' {
  bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "pbcopy"
  unbind C-p
  bind C-p run "pbpaste | tmux load-buffer - ; tmux paste-buffer"
} {
  # Wayland (wl-copy/wl-paste)
  if-shell 'command -v wl-copy >/dev/null' {
    bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "wl-copy"
    unbind C-p
    bind C-p run "wl-paste --no-newline | tmux load-buffer - ; tmux paste-buffer"
  } {
    # X11 (xclip)
    if-shell 'command -v xclip >/dev/null' {
      bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -in"
      unbind C-p
      bind C-p run "xclip -selection clipboard -out | tmux load-buffer - ; tmux paste-buffer"
    }
  }
}


##### ──────────────────────────────────────────────
#####  Plugin Configuration
##### ──────────────────────────────────────────────

# List of Tmux plugins
set -g @plugin 'tmux-plugins/tpm'          # Tmux Plugin Manager (TPM)
set -g @plugin 'catppuccin/tmux'           # Catppuccin theme for Tmux
set -g @plugin 'jimeh/tmuxifier'           # Tmux session/window manager
# set -g @plugin 'tmux-plugins/tmux-sensible'  # Sensible defaults (optional)


##### ──────────────────────────────────────────────
#####  Catppuccin Theme Customization
##### ──────────────────────────────────────────────

# Move the status bar to the top
set-option -g status-position top

# Customize Catppuccin window bar separators
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"

# Window title styling
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"

set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

# Customize status bar modules and separators
set -g @catppuccin_status_modules_right "directory user host session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

# Display the current directory in the status bar
set -g @catppuccin_directory_text "#{pane_current_path}"


##### ──────────────────────────────────────────────
#####  Final Setup
##### ──────────────────────────────────────────────

# Initialize TPM (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
